<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 16px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span { font-size: 20px; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-start {
      background: #4A90D9;
      color: #fff;
    }
    .btn-start:hover { background: #3a7bc8; }
    .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-stop {
      background: #e74c3c;
      color: #fff;
      display: none;
    }
    .btn-stop:hover { background: #c0392b; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }
    .step {
      margin-top: 10px;
      padding: 8px;
      background: #16213e;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.4;
      display: none;
    }
    .step.active { display: block; }
    .step-num {
      display: inline-block;
      width: 18px; height: 18px;
      line-height: 18px;
      text-align: center;
      border-radius: 50%;
      background: #4A90D9;
      color: #fff;
      font-size: 10px;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <h1><span>☝️</span> Sudo Pointer</h1>
  <button class="btn btn-start" id="startBtn">▶ Start Demo</button>
  <button class="btn btn-stop" id="stopBtn">■ Stop Demo</button>
  <div id="status">Ready</div>
  <div class="step" id="step1">
    <span class="step-num">1</span> Pointing at URL bar — type <b>linkedin.com</b>
  </div>
  <div class="step" id="step2">
    <span class="step-num">2</span> Highlighting <b>Create Post</b> button on LinkedIn
  </div>
  <div class="step" id="step3">
    <span class="step-num">✓</span> <b>DONE</b>
  </div>
  <script src="popup.js"></script>
</body>
</html>
